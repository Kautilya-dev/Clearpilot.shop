<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — Create your account</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=6" />
</head>
<body class="bg-white text-gray-900 antialiased">

<header class="border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 font-semibold text-lg">
      <i data-lucide="compass" class="text-purple-600 w-6 h-6"></i>ClearPilot
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-600">
      <a href="/dashboard" class="hover:text-gray-900">Dashboard</a>
      <a href="/about" class="hover:text-gray-900">About</a>
      <a href="/download" class="hover:text-gray-900">Download</a>
      <a href="/data" class="hover:text-gray-900">Data &amp; Privacy</a>
    </nav>
    <div id="nav-auth" class="flex items-center gap-3"></div>
  </div>
</header>

<main class="max-w-sm mx-auto px-6 py-20">
  <h1 class="text-2xl font-semibold tracking-tight mb-1">Create your account</h1>
  <p class="text-sm text-gray-500 mb-6">One account, web and desktop.</p>

  <div id="form-error" class="alert-error mb-4 hidden"></div>

  <form id="register-form" class="space-y-4">
    <div>
      <label class="text-sm font-medium text-gray-700 mb-1.5 block">Name</label>
      <input type="text" name="display_name" required class="field-input" placeholder="Jane Doe" />
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700 mb-1.5 block">Email</label>
      <input type="email" name="email" required class="field-input" placeholder="you@example.com" />
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700 mb-1.5 block">Password</label>
      <input type="password" name="password" required minlength="8" class="field-input" placeholder="At least 8 characters" />
    </div>
    <button type="submit" class="btn-primary w-full justify-center">Create account</button>
  </form>

  <p class="text-sm text-gray-500 mt-6 text-center">
    Already have an account? <a href="/login" class="text-purple-600 hover:underline font-medium">Log in</a>
  </p>
</main>

<script src="/assets/js/app.js?v=5"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('form-error');
    errorBox.classList.add('hidden');

    const form = new FormData(e.target);
    const body = {
      email: form.get('email'),
      password: form.get('password'),
      display_name: form.get('display_name'),
    };

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) {
        errorBox.textContent = data.detail || 'Something went wrong.';
        errorBox.classList.remove('hidden');
        return;
      }
      setToken(data.access_token);
      window.location.href = '/dashboard';
    } catch (err) {
      errorBox.textContent = 'Could not reach the server. Try again.';
      errorBox.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
