<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=3" />
</head>
<body class="bg-white text-gray-900 antialiased">

<header class="border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 font-semibold text-lg">
      <i data-lucide="compass" class="text-purple-600 w-6 h-6"></i>ClearPilot
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-600">
      <a href="/dashboard" class="hover:text-gray-900">Dashboard</a>
      <a href="/about" class="hover:text-gray-900">About</a>
      <a href="/download" class="hover:text-gray-900">Download</a>
      <a href="/data" class="hover:text-gray-900">Data &amp; Privacy</a>
    </nav>
    <div id="nav-auth" class="flex items-center gap-3"></div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 md:px-6 py-16">
  <h1 class="text-2xl font-semibold tracking-tight mb-1">Admin</h1>
  <p class="text-sm text-gray-500 mb-8">Internal — not linked from the public nav.</p>

  <div id="admin-loading" class="text-sm text-gray-500">Checking access...</div>
  <div id="admin-denied" class="alert-error hidden">You don't have admin access on this account.</div>

  <div id="admin-content" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-medium">Users</h2>
      <span id="user-count" class="text-sm text-gray-500"></span>
    </div>
    <div class="border border-gray-200 rounded-2xl overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-left text-gray-500">
          <tr>
            <th class="px-4 py-2.5 font-medium">Name</th>
            <th class="px-4 py-2.5 font-medium">Email</th>
            <th class="px-4 py-2.5 font-medium">Joined</th>
          </tr>
        </thead>
        <tbody id="users-table-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="/assets/js/app.js?v=3"></script>
<script>
  (async () => {
    const token = getToken();
    if (!token) {
      window.location.href = '/login';
      return;
    }

    const loading = document.getElementById('admin-loading');
    const denied = document.getElementById('admin-denied');
    const content = document.getElementById('admin-content');

    try {
      const res = await fetch('/api/admin/users', { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 403) {
        loading.classList.add('hidden');
        denied.classList.remove('hidden');
        return;
      }
      if (!res.ok) throw new Error('request failed');

      const users = await res.json();
      document.getElementById('user-count').textContent = `${users.length} total`;
      const tbody = document.getElementById('users-table-body');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="px-4 py-2.5">${u.display_name}</td>
          <td class="px-4 py-2.5 text-gray-500">${u.email}</td>
          <td class="px-4 py-2.5 text-gray-500">${new Date(u.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');

      loading.classList.add('hidden');
      content.classList.remove('hidden');
    } catch (e) {
      loading.textContent = 'Could not load admin data.';
    }
  })();
</script>
</body>
</html>
