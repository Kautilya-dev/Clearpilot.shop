<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — My Interviews</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=3" />
</head>
<body class="bg-white text-gray-900 antialiased h-screen overflow-hidden">

<div class="h-screen flex flex-col md:flex-row overflow-hidden">
  <!-- Mobile-only top bar + slide-down menu - the sidebar below is desktop-only (md:flex),
       so this is the sole way to reach History/Settings from a phone. -->
  <div class="md:hidden flex items-center justify-between px-4 h-14 border-b border-gray-200 shrink-0">
    <a href="/dashboard" class="flex items-center gap-2 font-semibold">
      <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
    </a>
    <button id="mobile-menu-btn" class="text-gray-500" aria-label="Menu">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
  </div>
  <div id="mobile-menu" class="md:hidden hidden border-b border-gray-200 px-3 py-3 space-y-1 shrink-0">
    <a href="/dashboard" class="sidebar-link active"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
    <a href="/history" class="sidebar-link"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
    <div id="sidebar-user-mobile" class="border-t border-gray-200 mt-1 pt-1"></div>
  </div>

  <aside class="hidden md:flex w-56 shrink-0 border-r border-gray-200 flex-col bg-white">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold">
        <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
      </a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link active"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="/history" class="sidebar-link"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 space-y-1">
      <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
      <div id="sidebar-user"></div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-4xl mx-auto px-4 md:px-8 py-10">
      <div class="flex items-center justify-between mb-1">
        <h1 id="greeting" class="text-2xl font-semibold tracking-tight">My Interviews</h1>
        <button id="new-interview-btn" class="btn-primary text-sm"><i data-lucide="plus" class="w-4 h-4"></i>New interview</button>
      </div>
      <p class="text-sm text-gray-500 mb-6">Each interview has its own materials, Q&amp;A, and Copilot — grounded in the subjects you pick.</p>

      <div id="create-form" class="border border-gray-200 rounded-2xl p-5 mb-6 hidden">
        <div id="create-error" class="alert-error mb-3 hidden"></div>
        <label class="text-xs font-medium text-gray-700 mb-1.5 block">Title</label>
        <input id="create-title" type="text" class="field-input mb-4" placeholder="e.g. SAP CPI - Acme Corp" list="subject-name-suggestions" />
        <datalist id="subject-name-suggestions"></datalist>
        <label class="text-xs font-medium text-gray-700 mb-1.5 block">Subject(s) to ground this interview in</label>
        <p class="text-xs text-gray-400 mb-2.5">Pick one or more — combine subjects for cross-topic interviews.</p>
        <div id="subject-cards" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">Loading subjects...</div>
        <p id="materials-caution" class="text-xs text-amber-600 mb-4 hidden"></p>
        <div class="flex gap-2">
          <button id="create-save" class="btn-primary text-sm">Create interview</button>
          <button id="create-cancel" class="btn-secondary text-sm">Cancel</button>
        </div>
      </div>

      <div id="interviews-list" class="space-y-3">Loading...</div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js?v=3"></script>
<script>
  if (!requireAuthOrRedirect()) { /* redirected */ }

  let selectedSubjectIds = new Set();
  let loadedSubjects = [];
  // True once the user has typed their own text - auto-fill from selected subjects stops
  // touching the field after that, and resumes if they clear it back to empty.
  let titleTouched = false;

  const STATE_STYLES = {
    active: 'bg-purple-50 text-purple-700',
    completed: 'bg-green-50 text-green-700',
    archived: 'bg-gray-100 text-gray-500',
  };

  // Turns ["Python", "React"] into "Python & React Interview", ["Python"] into "Python Interview",
  // and 3+ into "Python, React & Graphic Designing Interview".
  function generateInterviewTitle(subjectNames) {
    if (subjectNames.length === 0) return '';
    if (subjectNames.length === 1) return `${subjectNames[0]} Interview`;
    const last = subjectNames[subjectNames.length - 1];
    const rest = subjectNames.slice(0, -1);
    return `${rest.join(', ')} & ${last} Interview`;
  }

  function updateTitleSuggestion() {
    if (titleTouched) return;
    const names = loadedSubjects.filter(s => selectedSubjectIds.has(s.id)).map(s => s.name);
    document.getElementById('create-title').value = generateInterviewTitle(names);
  }

  function updateMaterialsCaution() {
    const needsMaterialsNames = loadedSubjects
      .filter(s => selectedSubjectIds.has(s.id) && s.status !== 'available')
      .map(s => s.name);
    const box = document.getElementById('materials-caution');
    if (needsMaterialsNames.length === 0) {
      box.classList.add('hidden');
      return;
    }
    box.textContent = `No context available based on your materials for: ${needsMaterialsNames.join(', ')}. Answers will rely on general knowledge and this interview's own materials and Q&A.`;
    box.classList.remove('hidden');
  }

  // All subjects are selectable, including ones with no ingested grounding corpus yet
  // (status !== 'available') - those just get a caution instead of being blocked, since
  // answers for them still work fine (general model knowledge + this interview's own
  // materials/Q&A), they just aren't grounded in a shared document corpus.
  async function loadSubjectCards() {
    const token = getToken();
    const res = await fetch('/api/subjects', { headers: { Authorization: `Bearer ${token}` } });
    loadedSubjects = res.ok ? await res.json() : [];

    document.getElementById('subject-name-suggestions').innerHTML =
      loadedSubjects.map(s => `<option value="${s.name}"></option>`).join('');

    const el = document.getElementById('subject-cards');
    el.innerHTML = loadedSubjects.map(s => {
      const needsMaterials = s.status !== 'available';
      return `
      <button type="button" data-subject-id="${s.id}" data-needs-materials="${needsMaterials}"
        class="subject-card text-left border rounded-xl p-3 transition border-gray-200 hover:border-purple-300 cursor-pointer">
        <p class="text-sm font-medium">${s.name}</p>
        <p class="text-xs mt-0.5 ${needsMaterials ? 'text-amber-500' : 'text-gray-400'}">${needsMaterials ? '⚠ No materials' : 'Available'}</p>
      </button>
    `;
    }).join('');

    el.querySelectorAll('.subject-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.subjectId;
        const needsMaterials = card.dataset.needsMaterials === 'true';
        const selectedClasses = needsMaterials
          ? ['border-amber-400', 'bg-amber-50']
          : ['border-purple-600', 'bg-purple-50'];
        if (selectedSubjectIds.has(id)) {
          selectedSubjectIds.delete(id);
          card.classList.remove(...selectedClasses);
          card.classList.add('border-gray-200');
        } else {
          selectedSubjectIds.add(id);
          card.classList.remove('border-gray-200');
          card.classList.add(...selectedClasses);
        }
        updateTitleSuggestion();
        updateMaterialsCaution();
      });
    });
  }

  document.getElementById('create-title').addEventListener('input', (e) => {
    titleTouched = e.target.value.trim().length > 0;
  });

  async function loadInterviews() {
    const token = getToken();
    const res = await fetch('/api/interviews', { headers: { Authorization: `Bearer ${token}` } });
    const interviews = res.ok ? await res.json() : [];

    const listEl = document.getElementById('interviews-list');
    if (interviews.length === 0) {
      listEl.innerHTML = '<p class="text-sm text-gray-500">No interviews yet — create one to get started.</p>';
      return;
    }

    listEl.innerHTML = interviews.map(i => `
      <div onclick="window.location.href='/interviews/${i.id}'" class="block border border-gray-200 rounded-xl p-4 hover:border-purple-300 transition cursor-pointer">
        <div class="flex items-start justify-between gap-3 mb-2">
          <p class="text-sm font-medium">${i.title}</p>
          <div class="flex items-center gap-2 shrink-0">
            <span class="text-xs px-2 py-0.5 rounded-full ${STATE_STYLES[i.state] || 'bg-gray-100 text-gray-500'}">${i.state}</span>
            <button onclick="event.stopPropagation(); deleteInterview('${i.id}')" class="text-gray-400 hover:text-red-600">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        <div class="flex items-center gap-1.5 flex-wrap">
          ${i.subjects.map(s => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${s.name}</span>`).join('')}
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  async function deleteInterview(id) {
    if (!confirm('Delete this interview and all its materials, Q&A, and history? This cannot be undone.')) return;
    const token = getToken();
    await fetch(`/api/interviews/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadInterviews();
  }

  document.getElementById('new-interview-btn').addEventListener('click', async () => {
    document.getElementById('create-form').classList.remove('hidden');
    await loadSubjectCards();
  });
  document.getElementById('create-cancel').addEventListener('click', () => {
    document.getElementById('create-form').classList.add('hidden');
    document.getElementById('create-title').value = '';
    titleTouched = false;
    selectedSubjectIds = new Set();
    document.getElementById('materials-caution').classList.add('hidden');
  });

  document.getElementById('create-save').addEventListener('click', async () => {
    const errorBox = document.getElementById('create-error');
    errorBox.classList.add('hidden');
    const title = document.getElementById('create-title').value.trim();

    if (!title) {
      errorBox.textContent = 'Give this interview a title.';
      errorBox.classList.remove('hidden');
      return;
    }
    if (selectedSubjectIds.size === 0) {
      errorBox.textContent = 'Pick at least one subject.';
      errorBox.classList.remove('hidden');
      return;
    }

    const token = getToken();
    const res = await fetch('/api/interviews', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ title, subject_ids: Array.from(selectedSubjectIds) }),
    });
    const data = await res.json();
    if (!res.ok) {
      errorBox.textContent = data.detail || 'Something went wrong.';
      errorBox.classList.remove('hidden');
      return;
    }

    window.location.href = `/interviews/${data.id}`;
  });

  (async () => {
    const user = await fetchCurrentUser();
    if (user) document.getElementById('greeting').textContent = `My Interviews`;
    await loadInterviews();
  })();
</script>
</body>
</html>
