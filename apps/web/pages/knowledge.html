<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — Knowledge base</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=2" />
</head>
<body class="bg-white text-gray-900 antialiased h-screen overflow-hidden">

<div class="h-screen flex overflow-hidden">
  <aside class="w-56 shrink-0 border-r border-gray-200 flex flex-col bg-white">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold">
        <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
      </a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="/ask" class="sidebar-link"><i data-lucide="message-circle" class="w-4 h-4"></i>Ask</a>
      <a href="/materials" class="sidebar-link"><i data-lucide="folder" class="w-4 h-4"></i>Materials</a>
      <a href="/knowledge" class="sidebar-link active"><i data-lucide="book-marked" class="w-4 h-4"></i>Knowledge base</a>
      <a href="/history" class="sidebar-link"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 space-y-1">
      <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
      <div id="sidebar-user"></div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-3xl mx-auto px-8 py-10">
      <div class="flex items-center justify-between mb-1">
        <h1 class="text-2xl font-semibold tracking-tight">Knowledge base</h1>
        <button id="add-btn" class="btn-primary text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Add entry</button>
      </div>
      <p class="text-sm text-gray-500 mb-6">Your own hand-picked Q&amp;A — answers you've personally vetted and want to remember.</p>

      <div id="add-form" class="border border-gray-200 rounded-2xl p-5 mb-6 hidden">
        <div id="add-error" class="alert-error mb-3 hidden"></div>
        <label class="text-xs font-medium text-gray-700 mb-1.5 block">Question</label>
        <input id="add-question" type="text" class="field-input mb-3" placeholder="e.g. What is a Content Modifier used for?" />
        <label class="text-xs font-medium text-gray-700 mb-1.5 block">Answer</label>
        <textarea id="add-answer" rows="4" class="field-input mb-3" placeholder="Your answer..."></textarea>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-xs font-medium text-gray-700 mb-1.5 block">Category</label>
            <input id="add-category" type="text" class="field-input" placeholder="e.g. Adapters" />
          </div>
          <div>
            <label class="text-xs font-medium text-gray-700 mb-1.5 block">Tags (comma-separated)</label>
            <input id="add-tags" type="text" class="field-input" placeholder="e.g. sftp, security" />
          </div>
        </div>
        <div class="flex gap-2">
          <button id="add-save" class="btn-primary text-sm">Save</button>
          <button id="add-cancel" class="btn-secondary text-sm">Cancel</button>
        </div>
      </div>

      <input id="search-input" type="text" class="field-input mb-4" placeholder="Search your knowledge base..." />
      <div id="kb-list" class="space-y-3">Loading...</div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js?v=2"></script>
<script>
  if (!requireAuthOrRedirect()) { /* redirected */ }

  async function loadEntries(search) {
    const token = getToken();
    const url = search ? `/api/knowledge?search=${encodeURIComponent(search)}` : '/api/knowledge';
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    const entries = res.ok ? await res.json() : [];

    const listEl = document.getElementById('kb-list');
    if (entries.length === 0) {
      listEl.innerHTML = '<p class="text-sm text-gray-500">No entries yet — save answers you trust as you go.</p>';
      return;
    }

    listEl.innerHTML = entries.map(e => `
      <div class="border border-gray-200 rounded-xl p-4">
        <div class="flex items-start justify-between gap-3 mb-1.5">
          <p class="text-sm font-medium">${e.question}</p>
          <button onclick="deleteEntry('${e.id}')" class="text-gray-400 hover:text-red-600 shrink-0">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        <p class="text-sm text-gray-600 mb-2">${e.answer}</p>
        <div class="flex items-center gap-1.5 flex-wrap">
          ${e.category ? `<span class="text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full">${e.category}</span>` : ''}
          ${e.tags.split(',').filter(t => t.trim()).map(t => `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${t.trim()}</span>`).join('')}
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    const token = getToken();
    await fetch(`/api/knowledge/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadEntries();
  }

  let searchTimeout;
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => loadEntries(e.target.value.trim()), 300);
  });

  document.getElementById('add-btn').addEventListener('click', () => {
    document.getElementById('add-form').classList.remove('hidden');
  });
  document.getElementById('add-cancel').addEventListener('click', () => {
    document.getElementById('add-form').classList.add('hidden');
  });

  document.getElementById('add-save').addEventListener('click', async () => {
    const errorBox = document.getElementById('add-error');
    errorBox.classList.add('hidden');
    const question = document.getElementById('add-question').value.trim();
    const answer = document.getElementById('add-answer').value.trim();
    const category = document.getElementById('add-category').value.trim();
    const tags = document.getElementById('add-tags').value.trim();

    if (!question || !answer) {
      errorBox.textContent = 'Question and answer are both required.';
      errorBox.classList.remove('hidden');
      return;
    }

    const token = getToken();
    const res = await fetch('/api/knowledge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ question, answer, category, tags }),
    });
    if (!res.ok) {
      const data = await res.json();
      errorBox.textContent = data.detail || 'Something went wrong.';
      errorBox.classList.remove('hidden');
      return;
    }

    ['add-question', 'add-answer', 'add-category', 'add-tags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-form').classList.add('hidden');
    loadEntries();
  });

  loadEntries();
</script>
</body>
</html>
