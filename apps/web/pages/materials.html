<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — Materials</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=2" />
</head>
<body class="bg-white text-gray-900 antialiased h-screen overflow-hidden">

<div class="h-screen flex overflow-hidden">
  <aside class="w-56 shrink-0 border-r border-gray-200 flex flex-col bg-white">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold">
        <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
      </a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="/ask" class="sidebar-link"><i data-lucide="message-circle" class="w-4 h-4"></i>Ask</a>
      <a href="/materials" class="sidebar-link active"><i data-lucide="folder" class="w-4 h-4"></i>Materials</a>
      <a href="/knowledge" class="sidebar-link"><i data-lucide="book-marked" class="w-4 h-4"></i>Knowledge base</a>
      <a href="/history" class="sidebar-link"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 space-y-1">
      <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
      <div id="sidebar-user"></div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-3xl mx-auto px-8 py-10">
      <div class="flex items-center justify-between mb-1">
        <h1 class="text-2xl font-semibold tracking-tight">Materials</h1>
        <button id="add-btn" class="btn-primary text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Add material</button>
      </div>
      <p class="text-sm text-gray-500 mb-6">Your resume, job description, and reference material — only the active resume and JD ground your answers in Ask.</p>

      <div id="add-form" class="border border-gray-200 rounded-2xl p-5 mb-6 hidden">
        <div id="add-error" class="alert-error mb-3 hidden"></div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-xs font-medium text-gray-700 mb-1.5 block">Type</label>
            <select id="add-type" class="field-input">
              <option value="resume">Resume</option>
              <option value="job_description">Job description</option>
              <option value="project_spec">Project spec</option>
              <option value="domain_knowledge">Domain knowledge</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-gray-700 mb-1.5 block">Name</label>
            <input id="add-name" type="text" class="field-input" placeholder="e.g. My resume" />
          </div>
        </div>
        <label class="text-xs font-medium text-gray-700 mb-1.5 block">Content</label>
        <textarea id="add-text" rows="6" class="field-input mb-3" placeholder="Paste the text content..."></textarea>
        <div class="flex gap-2">
          <button id="add-save" class="btn-primary text-sm">Save</button>
          <button id="add-cancel" class="btn-secondary text-sm">Cancel</button>
        </div>
      </div>

      <div id="materials-list" class="space-y-6">Loading...</div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js?v=2"></script>
<script>
  if (!requireAuthOrRedirect()) { /* redirected */ }

  const TYPE_LABELS = {
    resume: 'Resume', job_description: 'Job description', project_spec: 'Project spec', domain_knowledge: 'Domain knowledge',
  };

  async function loadMaterials() {
    const token = getToken();
    const res = await fetch('/api/materials', { headers: { Authorization: `Bearer ${token}` } });
    const materials = res.ok ? await res.json() : [];

    const listEl = document.getElementById('materials-list');
    if (materials.length === 0) {
      listEl.innerHTML = '<p class="text-sm text-gray-500">No materials yet — add your resume and job description to get personalized answers.</p>';
      return;
    }

    const byType = {};
    for (const m of materials) {
      (byType[m.type] = byType[m.type] || []).push(m);
    }

    listEl.innerHTML = Object.entries(byType).map(([type, items]) => `
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">${TYPE_LABELS[type] || type}</p>
        <div class="space-y-2">
          ${items.map(m => `
            <div class="border border-gray-200 rounded-xl p-4 flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate">${m.name}</p>
                <p class="text-xs text-gray-500 truncate mt-0.5">${m.text.slice(0, 120)}${m.text.length > 120 ? '...' : ''}</p>
              </div>
              <div class="flex items-center gap-3 shrink-0">
                <label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer">
                  <input type="checkbox" ${m.active ? 'checked' : ''} onchange="toggleActive('${m.id}', this.checked)" />
                  Active
                </label>
                <button onclick="deleteMaterial('${m.id}')" class="text-gray-400 hover:text-red-600">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  async function toggleActive(id, active) {
    const token = getToken();
    await fetch(`/api/materials/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ active }),
    });
  }

  async function deleteMaterial(id) {
    if (!confirm('Delete this material?')) return;
    const token = getToken();
    await fetch(`/api/materials/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadMaterials();
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    document.getElementById('add-form').classList.remove('hidden');
  });
  document.getElementById('add-cancel').addEventListener('click', () => {
    document.getElementById('add-form').classList.add('hidden');
  });

  document.getElementById('add-save').addEventListener('click', async () => {
    const errorBox = document.getElementById('add-error');
    errorBox.classList.add('hidden');
    const type = document.getElementById('add-type').value;
    const name = document.getElementById('add-name').value.trim();
    const text = document.getElementById('add-text').value.trim();

    if (!name || !text) {
      errorBox.textContent = 'Name and content are both required.';
      errorBox.classList.remove('hidden');
      return;
    }

    const token = getToken();
    const res = await fetch('/api/materials', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ type, name, text }),
    });
    if (!res.ok) {
      const data = await res.json();
      errorBox.textContent = data.detail || 'Something went wrong.';
      errorBox.classList.remove('hidden');
      return;
    }

    document.getElementById('add-name').value = '';
    document.getElementById('add-text').value = '';
    document.getElementById('add-form').classList.add('hidden');
    loadMaterials();
  });

  loadMaterials();
</script>
</body>
</html>
