<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — History</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=2" />
</head>
<body class="bg-white text-gray-900 antialiased h-screen overflow-hidden">

<div class="h-screen flex overflow-hidden">
  <aside class="w-56 shrink-0 border-r border-gray-200 flex flex-col bg-white">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold">
        <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
      </a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="/ask" class="sidebar-link"><i data-lucide="message-circle" class="w-4 h-4"></i>Ask</a>
      <a href="/materials" class="sidebar-link"><i data-lucide="folder" class="w-4 h-4"></i>Materials</a>
      <a href="/knowledge" class="sidebar-link"><i data-lucide="book-marked" class="w-4 h-4"></i>Knowledge base</a>
      <a href="/history" class="sidebar-link active"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 space-y-1">
      <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
      <div id="sidebar-user"></div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-3xl mx-auto px-8 py-10">
      <div class="flex items-center justify-between mb-1">
        <h1 class="text-2xl font-semibold tracking-tight">History</h1>
        <button id="clear-btn" class="text-sm text-red-600 hover:underline">Clear all</button>
      </div>
      <p class="text-sm text-gray-500 mb-6">Every question you've asked, in order. Promote good answers straight to your knowledge base.</p>

      <div id="history-list" class="space-y-3">Loading...</div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js?v=2"></script>
<script>
  if (!requireAuthOrRedirect()) { /* redirected */ }

  async function loadHistory() {
    const token = getToken();
    const res = await fetch('/api/history?limit=200', { headers: { Authorization: `Bearer ${token}` } });
    const entries = res.ok ? await res.json() : [];

    const listEl = document.getElementById('history-list');
    if (entries.length === 0) {
      listEl.innerHTML = '<p class="text-sm text-gray-500">No questions yet — head to Ask to get started.</p>';
      return;
    }

    listEl.innerHTML = entries.map(e => `
      <div class="border border-gray-200 rounded-xl p-4">
        <div class="flex items-start justify-between gap-3 mb-1.5">
          <p class="text-sm font-medium">${e.question}</p>
          <span class="text-xs text-gray-400 shrink-0">${new Date(e.created_at).toLocaleString()}</span>
        </div>
        <p class="text-sm text-gray-600 whitespace-pre-wrap mb-3">${e.answer}</p>
        <div class="flex items-center justify-between">
          <div class="flex flex-wrap gap-1.5">
            ${e.sources.slice(0, 3).map(s => `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${s.title}</span>`).join('')}
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <button onclick='saveToKB(${JSON.stringify(e.question)}, ${JSON.stringify(e.answer)})' class="text-xs text-purple-600 hover:underline">Save to knowledge base</button>
            <button onclick="deleteEntry('${e.id}')" class="text-gray-400 hover:text-red-600">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  async function saveToKB(question, answer) {
    const token = getToken();
    const res = await fetch('/api/knowledge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ question, answer, category: '', tags: '' }),
    });
    if (res.ok) alert('Saved to your knowledge base.');
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    const token = getToken();
    await fetch(`/api/history/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadHistory();
  }

  document.getElementById('clear-btn').addEventListener('click', async () => {
    if (!confirm('Clear all history? This cannot be undone.')) return;
    const token = getToken();
    await fetch('/api/history', { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadHistory();
  });

  loadHistory();
</script>
</body>
</html>
