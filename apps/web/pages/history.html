<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearPilot — History</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="/assets/css/styles.css?v=3" />
</head>
<body class="bg-white text-gray-900 antialiased h-screen overflow-hidden">

<div class="h-screen flex overflow-hidden">
  <aside class="w-56 shrink-0 border-r border-gray-200 flex flex-col bg-white">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold">
        <i data-lucide="compass" class="text-purple-600 w-5 h-5"></i>ClearPilot
      </a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="sidebar-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="/history" class="sidebar-link active"><i data-lucide="history" class="w-4 h-4"></i>History</a>
    </nav>
    <div class="px-3 py-3 border-t border-gray-200 space-y-1">
      <a href="/settings" class="sidebar-link"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
      <div id="sidebar-user"></div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-3xl mx-auto px-8 py-10">
      <h1 class="text-2xl font-semibold tracking-tight mb-1">History</h1>
      <p class="text-sm text-gray-500 mb-6">Every interview you've started. Click one to pick up exactly where you left off.</p>

      <div class="flex gap-1.5 mb-5" id="state-filter">
        <button data-state="" class="filter-btn text-xs px-3 py-1.5 rounded-full border">All</button>
        <button data-state="active" class="filter-btn text-xs px-3 py-1.5 rounded-full border">Active</button>
        <button data-state="completed" class="filter-btn text-xs px-3 py-1.5 rounded-full border">Completed</button>
        <button data-state="archived" class="filter-btn text-xs px-3 py-1.5 rounded-full border">Archived</button>
      </div>

      <div id="interviews-list" class="space-y-3">Loading...</div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js?v=2"></script>
<script>
  if (!requireAuthOrRedirect()) { /* redirected */ }

  const STATE_STYLES = {
    active: 'bg-purple-50 text-purple-700',
    completed: 'bg-green-50 text-green-700',
    archived: 'bg-gray-100 text-gray-500',
  };

  let allInterviews = [];
  let activeFilter = '';

  function renderInterviews() {
    const filtered = activeFilter ? allInterviews.filter(i => i.state === activeFilter) : allInterviews;
    const listEl = document.getElementById('interviews-list');

    if (filtered.length === 0) {
      listEl.innerHTML = '<p class="text-sm text-gray-500">Nothing here yet.</p>';
      return;
    }

    listEl.innerHTML = filtered.map(i => `
      <div onclick="window.location.href='/interviews/${i.id}'" class="border border-gray-200 rounded-xl p-4 hover:border-purple-300 transition cursor-pointer">
        <div class="flex items-start justify-between gap-3 mb-2">
          <p class="text-sm font-medium">${i.title}</p>
          <div class="flex items-center gap-2 shrink-0">
            <span class="text-xs px-2 py-0.5 rounded-full ${STATE_STYLES[i.state] || 'bg-gray-100 text-gray-500'}">${i.state}</span>
            <button onclick="event.stopPropagation(); deleteInterview('${i.id}')" class="text-gray-400 hover:text-red-600">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5 flex-wrap">
            ${i.subjects.map(s => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${s.name}</span>`).join('')}
          </div>
          <span class="text-xs text-gray-400 shrink-0">${new Date(i.created_at).toLocaleDateString()}</span>
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  async function loadInterviews() {
    const token = getToken();
    const res = await fetch('/api/interviews', { headers: { Authorization: `Bearer ${token}` } });
    allInterviews = res.ok ? await res.json() : [];
    renderInterviews();
  }

  async function deleteInterview(id) {
    if (!confirm('Delete this interview and all its materials, Q&A, and history? This cannot be undone.')) return;
    const token = getToken();
    await fetch(`/api/interviews/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadInterviews();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.state;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('border-purple-600', b === btn);
        b.classList.toggle('text-purple-700', b === btn);
        b.classList.toggle('border-gray-200', b !== btn);
        b.classList.toggle('text-gray-500', b !== btn);
      });
      renderInterviews();
    });
  });
  document.querySelector('.filter-btn[data-state=""]').classList.add('border-purple-600', 'text-purple-700');
  document.querySelectorAll('.filter-btn:not([data-state=""])').forEach(b => b.classList.add('border-gray-200', 'text-gray-500'));

  loadInterviews();
</script>
</body>
</html>
