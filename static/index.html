<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearPilot - SAP CPI Study Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        colors: {
          brand: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#7c5cff',600:'#6d3bf2',700:'#5b21d6',800:'#4c1d95',900:'#3b0f80' }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen overflow-hidden">

  <div class="flex h-screen">

    <!-- Mobile overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar(false)"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200">
      <div class="flex items-center justify-between px-5 h-16 flex-shrink-0">
        <div class="flex items-center gap-2.5">
          <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-600 to-brand-400 flex items-center justify-center text-xs font-bold flex-shrink-0">CP</span>
          <div>
            <div class="font-extrabold text-base leading-tight">ClearPilot</div>
            <div class="text-[10px] text-slate-400 leading-tight">SAP CPI Assistant</div>
          </div>
        </div>
        <button onclick="toggleSidebar(false)" class="lg:hidden text-slate-400 hover:text-white">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <nav class="px-3 space-y-1 mt-2">
        <button type="button" id="navAskBtn" class="nav-item active w-full text-left" onclick="setMode('ask')">
          <i data-lucide="message-circle" class="w-4.5 h-4.5"></i> Ask
        </button>
        <button type="button" id="navPracticeBtn" class="nav-item w-full text-left" onclick="setMode('practice')">
          <i data-lucide="graduation-cap" class="w-4.5 h-4.5"></i> Practice
        </button>
      </nav>

      <div class="h-px bg-white/10 my-4 mx-3"></div>

      <div class="px-4 text-xs font-semibold tracking-wide text-slate-400 uppercase mb-2">Add content</div>
      <div class="px-3">
        <div id="sidebarDropzone"
             ondragover="event.preventDefault(); this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleDrop(event)"
             onclick="document.getElementById('uploadInput').click()"
             class="dropzone rounded-xl p-4 text-center cursor-pointer bg-white/5 border-white/15">
          <i data-lucide="upload-cloud" class="w-5 h-5 text-brand-400 mx-auto mb-1.5"></i>
          <p class="text-xs font-medium text-slate-300">Drag a file or <span class="text-brand-400">browse</span></p>
          <p class="text-[10px] text-slate-500 mt-1">PDF, DOCX, TXT, MD, HTML</p>
          <input id="uploadInput" type="file" class="hidden" accept=".pdf,.docx,.txt,.html,.htm,.md,.markdown" onchange="handleFileSelect(event)">
        </div>
        <p id="uploadStatus" class="text-[11px] text-slate-400 mt-2"></p>
      </div>

      <div class="flex-1"></div>

      <div class="border-t border-white/10 p-3">
        <a href="/logout" class="nav-item w-full text-red-300 hover:text-red-200 hover:bg-red-500/10">
          <i data-lucide="log-out" class="w-4.5 h-4.5"></i> Log out
        </a>
      </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">

      <header class="h-16 flex-shrink-0 flex items-center gap-3 px-4 sm:px-6 border-b border-slate-200 bg-white">
        <button onclick="toggleSidebar(true)" class="lg:hidden text-slate-500 hover:text-slate-800">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <h1 id="pageTitle" class="font-bold text-lg">Ask</h1>
      </header>

      <div class="flex-1 overflow-y-auto p-4 sm:p-6">
        <div class="max-w-3xl mx-auto space-y-6">

          <!-- Ask mode -->
          <section id="askMode" class="bg-white border border-slate-200 rounded-2xl p-5">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-medium text-slate-400">Model</span>
              <div class="inline-flex rounded-lg border border-slate-200 overflow-hidden" id="modelGroup">
                <button type="button" data-model="sonnet" onclick="selectModel(this)" class="px-3 py-1 text-xs font-medium bg-brand-50 text-brand-700">Detailed (Sonnet)</button>
                <button type="button" data-model="haiku" onclick="selectModel(this)" class="px-3 py-1 text-xs font-medium text-slate-500 border-l border-slate-200">Fast (Haiku)</button>
              </div>
            </div>
            <div class="flex items-center gap-2 mb-2">
              <button id="micBtn" class="mic-btn w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 text-slate-600 hover:bg-slate-200 flex-shrink-0 disabled:opacity-50" title="Click to start/stop speaking">
                <i data-lucide="mic" class="w-4.5 h-4.5"></i>
              </button>
              <input id="questionInput" type="text" placeholder="Ask a SAP CPI question, or click the mic and speak..."
                class="flex-1 rounded-full border border-slate-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
              <button id="askBtn" class="btn-primary w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0">
                <i data-lucide="send" class="w-4 h-4"></i>
              </button>
            </div>
            <p id="status" class="text-xs text-slate-400 mb-2 h-4"></p>
            <div id="answerBox" class="markdown-body text-sm leading-relaxed"></div>
            <div id="answerStructured" class="mt-3"></div>
            <p id="debugInfo" class="text-xs text-slate-400 mt-3 pt-3 border-t border-slate-100 hidden"></p>
          </section>

          <!-- Practice mode -->
          <section id="practiceMode" class="bg-white border border-slate-200 rounded-2xl p-5 hidden">
            <div class="flex gap-2 mb-4">
              <button id="nextQBtn" class="btn-primary rounded-lg px-4 py-2 text-sm font-semibold">Next Question</button>
              <button id="revealBtn" class="rounded-lg px-4 py-2 text-sm font-semibold border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Reveal Answer</button>
            </div>
            <div id="practiceQuestion" class="font-semibold mb-2"></div>
            <p id="practiceStatus" class="text-xs text-slate-400 mb-2 h-4"></p>
            <div id="practiceAnswer" class="markdown-body text-sm leading-relaxed"></div>
            <div id="practiceStructured" class="mt-3"></div>
            <p id="practiceDebugInfo" class="text-xs text-slate-400 mt-3 pt-3 border-t border-slate-100 hidden"></p>
          </section>

          <!-- History -->
          <section>
            <h2 class="text-sm font-semibold text-slate-500 mb-2">History</h2>
            <div id="historyList" class="space-y-2"></div>
          </section>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
