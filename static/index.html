<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearPilot - CPI Study Assistant</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4" style="max-width: 760px;">

    <header class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
      <h1 class="h4 mb-0">ClearPilot <small class="text-secondary fw-normal">SAP CPI Study Assistant</small></h1>
      <div class="btn-group" role="group">
        <button id="modeAskBtn" type="button" class="btn btn-primary active">Ask</button>
        <button id="modePracticeBtn" type="button" class="btn btn-outline-primary">Practice</button>
      </div>
    </header>

    <section id="askMode" class="card bg-body-tertiary border-secondary-subtle mb-4">
      <div class="card-body">
        <div class="input-group mb-2">
          <button id="micBtn" class="btn btn-outline-light" type="button" title="Click to start/stop speaking">🎤</button>
          <input id="questionInput" type="text" class="form-control" placeholder="Ask a SAP CPI question, or click the mic and speak...">
          <button id="askBtn" class="btn btn-primary" type="button">Ask</button>
        </div>
        <div id="status" class="form-text"></div>
        <div id="answerBox" class="mt-3"></div>
        <div id="answerStructured" class="mt-2"></div>
        <div id="debugInfo" class="form-text mt-2 border-top border-secondary-subtle pt-2 d-none"></div>
      </div>
    </section>

    <section id="practiceMode" class="card bg-body-tertiary border-secondary-subtle mb-4 d-none">
      <div class="card-body">
        <div class="d-flex gap-2 mb-3">
          <button id="nextQBtn" class="btn btn-primary">Next Question</button>
          <button id="revealBtn" class="btn btn-outline-primary" disabled>Reveal Answer</button>
        </div>
        <div id="practiceQuestion" class="fw-semibold mb-2"></div>
        <div id="practiceStatus" class="form-text"></div>
        <div id="practiceAnswer"></div>
        <div id="practiceStructured" class="mt-2"></div>
        <div id="practiceDebugInfo" class="form-text mt-2 border-top border-secondary-subtle pt-2 d-none"></div>
      </div>
    </section>

    <section class="card bg-body-tertiary border-secondary-subtle mb-4">
      <div class="card-body">
        <h2 class="h6 text-secondary mb-2">Add a document</h2>
        <div class="input-group">
          <input id="uploadInput" type="file" class="form-control" accept=".pdf,.docx,.txt,.html,.htm,.md,.markdown">
          <button id="uploadBtn" class="btn btn-outline-primary" type="button">Upload</button>
        </div>
        <div id="uploadStatus" class="form-text"></div>
      </div>
    </section>

    <section>
      <h2 class="h6 text-secondary">History</h2>
      <div id="historyList" class="list-group"></div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
