name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build Windows installer
        run: npm run build
        working-directory: apps/desktop

      - name: Rename artifact (stable filename for /latest/ links)
        run: |
          $src = Get-ChildItem "apps/desktop/dist" -Filter "ClearPilot Setup*.exe" | Select-Object -First 1
          Rename-Item $src.FullName "ClearPilot-Setup.exe"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ClearPilot ${{ github.ref_name }}
          draft: ${{ inputs.draft || false }}
          files: apps/desktop/dist/ClearPilot-Setup.exe
          generate_release_notes: true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist/ClearPilot-Setup.exe
          if-no-files-found: error
